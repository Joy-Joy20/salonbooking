{% extends 'base.html' %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="background:white; border-radius:24px; padding:40px 32px; max-width:440px; width:100%; text-align:center; box-shadow:0 8px 40px rgba(233,30,140,0.12); border:1px solid #fce4f0;">

        <div style="font-size:56px; margin-bottom:16px;">📧</div>
        <h1 style="font-size:22px; font-weight:700; color:#1a1a2e; margin-bottom:8px;">Check Your Email</h1>
        <p style="font-size:14px; color:#888; margin-bottom:24px; line-height:1.6;">
            We sent a verification link to<br>
            <strong style="color:#e91e8c;">{{ email }}</strong>
        </p>

        <div style="background:#fdf0f6; border-radius:12px; padding:16px; margin-bottom:24px; text-align:left;">
            <p style="font-size:13px; color:#555; margin-bottom:8px; font-weight:600;">📌 Next steps:</p>
            <p style="font-size:13px; color:#555; margin-bottom:4px;">1. Open your email inbox</p>
            <p style="font-size:13px; color:#555; margin-bottom:4px;">2. Click the verification link</p>
            <p style="font-size:13px; color:#555;">3. You'll be redirected to login</p>
        </div>

        <p style="font-size:13px; color:#aaa; margin-bottom:16px;">Didn't receive the email?</p>

        <form method="POST" action="/resend-verification">
            <input type="hidden" name="email" value="{{ email }}">
            <button type="submit" style="width:100%; padding:12px; background:white; color:#e91e8c; border:2px solid #e91e8c; border-radius:999px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Poppins',sans-serif; margin-bottom:12px;">
                Resend Verification Email
            </button>
        </form>

        <a href="/login" style="font-size:13px; color:#aaa; text-decoration:none;">← Back to Login</a>
    </div>
</div>
{% endblock %}
