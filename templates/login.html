{% extends 'base.html' %}

{% block content %}
<div class="card">
    <h1>Login 👤</h1>
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}
    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <div style="text-align:center; margin-top:6px; margin-bottom:14px;">
            <a href="/forgot-password" style="font-size:12px; color:#e91e8c; text-decoration:none; font-weight:500;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Forgot Password?</a>
        </div>
        <button type="submit">Login</button>
    </form>
    <p style="margin-top:15px;">Don't have an account? <a href="/signup">Sign Up</a></p>
</div>
{% endblock %}
