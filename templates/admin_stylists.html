{% extends 'base.html' %}
{% block content %}
<div style="max-width:1000px; margin:0 auto; padding:40px 30px;">
    <h1 style="color:#e91e8c; text-align:center;">Manage Stylists ✂️</h1>

    <div class="card" style="margin:30px auto 30px; max-width:500px;">
        <h3 style="text-align:left; margin-bottom:16px;">Add New Stylist</h3>
        <form method="POST" action="/admin/stylists/add" style="display:flex; flex-direction:column; gap:12px; align-items:stretch;">
            <input type="text" name="name" placeholder="Full Name" required style="margin:0; width:100%;">
            <input type="text" name="specialty" placeholder="Specialty" required style="margin:0; width:100%;">
            <input type="text" name="photo" placeholder="Photo URL (optional)" style="margin:0; width:100%;">
            <button type="submit" style="margin:0; width:100%;">Add Stylist</button>
        </form>
    </div>

    <div class="stylist-grid">
        {% for s in stylists %}
        <div class="stylist-card">
            <img src="{{ s.photo or 'https://i.pravatar.cc/150?u=' + s.name }}" alt="{{ s.name }}">
            <h3>{{ s.name }}</h3>
            <p class="specialty">{{ s.specialty }}</p>
            <a href="/admin/stylists/delete/{{ s.id }}" class="btn-delete" onclick="return confirm('Delete this stylist?')" style="margin-top:10px;">Delete</a>
        </div>
        {% else %}
        <p style="color:#999; text-align:center;">No stylists yet.</p>
        {% endfor %}
    </div>
</div>
{% endblock %}
