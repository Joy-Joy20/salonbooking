<!DOCTYPE html>
<html>
<head>
    <title>Salon Booking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<nav style="position: sticky; top: 0; z-index: 1000;">

    <!-- CENTER LINKS -->
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/book">Book</a>
        <a href="/bookings">My Bookings</a>
        <a href="/about">About Us</a>
        <a href="/contact">Contact Us</a>
        <a href="/stylist">Stylists</a>
    </div>

    <!-- RIGHT LOGIN ICON -->
    <div class="nav-right">
        {% if session.get('user') %}
            <span style="font-size:13px; font-weight:bold;">👤 {{ session['user'] }}</span>
            <a href="/logout" style="margin-left:10px; font-size:13px;">Logout</a>
        {% else %}
            <a href="/login"><i class="fa fa-user"></i></a>
        {% endif %}
    </div>

</nav>

<div class="container">
    {% block content %}{% endblock %}
</div>

</body>
</html>
