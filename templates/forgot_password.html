{% extends 'base.html' %}
{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="max-width:420px; width:100%;">
        <div style="text-align:center; margin-bottom:1.2rem;">
            <span style="font-size:48px;">🔐</span>
            <h2 style="font-size:20px; font-weight:700; color:#1a1a1a; margin-top:8px;">Forgot Password</h2>
            <p style="font-size:13px; color:#888; margin-top:4px;">Enter your email and we'll send you a reset link.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div style="padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:12px;
                background:{% if category == 'success' %}#d1f5d3{% else %}#fde8e8{% endif %};
                color:{% if category == 'success' %}#1a6b2a{% else %}#b91c1c{% endif %};">
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/forgot-password" style="align-items:stretch;">
            <input type="email" name="email" placeholder="Enter your email address" required
                style="width:100%; padding:12px 16px; border-radius:12px; border:1.5px solid #f0b8d8;
                font-size:13px; margin-bottom:14px; outline:none; box-sizing:border-box; font-family:'Poppins',sans-serif;">
            <button type="submit" class="book-btn" style="width:100%; margin-top:0;">Send Reset Link 📧</button>
        </form>

        <div style="text-align:center; margin-top:16px;">
            <a href="/login" style="font-size:12px; color:#e91e8c; text-decoration:none;">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
