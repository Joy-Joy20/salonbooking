{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🔐 Forgot Password</h1>
            <p>Enter your email and we'll send you a reset link</p>
        </div>

        {% if message %}
        <div class="alert-success">✅ {{ message }}</div>
        {% endif %}

        {% if error %}
        <div class="alert-error">❌ {{ error }}</div>
        {% endif %}

        {% if not message %}
        <form action="/forgot-password" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required autofocus>
            </div>
            <button type="submit" class="btn-primary">Send Reset Link 📧</button>
        </form>
        {% endif %}

        <div class="auth-links">
            <a href="/login">← Back to Login</a>
        </div>
    </div>
</div>

<style>
.auth-page { min-height:80vh; display:flex; align-items:center; justify-content:center; background:#FFF0F7; padding:40px 20px; }
.auth-card { background:white; border-radius:20px; padding:40px; width:100%; max-width:440px; box-shadow:0 8px 30px rgba(255,20,147,0.12); }
.auth-header { text-align:center; margin-bottom:28px; }
.auth-header h1 { font-size:26px; font-weight:800; color:#1a1a2e; margin:0 0 8px; }
.auth-header p { color:#888; font-size:14px; margin:0; }
.form-group { margin-bottom:20px; }
.form-group label { display:block; font-size:14px; font-weight:600; color:#333; margin-bottom:6px; }
.form-group input { width:100%; padding:12px 16px; border:2px solid #e0e0e0; border-radius:10px; font-size:14px; box-sizing:border-box; transition:border 0.2s; font-family:'Poppins',sans-serif; }
.form-group input:focus { border-color:#FF1493; outline:none; }
.btn-primary { width:100%; background:#FF1493; color:white; border:none; padding:14px; border-radius:10px; font-size:15px; font-weight:700; cursor:pointer; font-family:'Poppins',sans-serif; }
.btn-primary:hover { background:#cc0077; }
.alert-success { background:#D1FAE5; color:#065F46; padding:14px 18px; border-radius:10px; font-size:14px; margin-bottom:20px; text-align:center; line-height:1.6; }
.alert-error { background:#FEE2E2; color:#991B1B; padding:14px 18px; border-radius:10px; font-size:14px; margin-bottom:20px; }
.auth-links { text-align:center; margin-top:20px; }
.auth-links a { color:#FF1493; text-decoration:none; font-size:14px; font-weight:600; }
</style>
{% endblock %}
