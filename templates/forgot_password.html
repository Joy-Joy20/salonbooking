{% extends 'base.html' %}

{% block content %}
<div style="min-height:80vh; display:flex; align-items:center; justify-content:center;">
    <div class="card" style="width:100%; max-width:400px; display:flex; flex-direction:column; align-items:center; text-align:center;">

        <span style="font-size:48px;">🔐</span>
        <h1 style="font-size:22px; margin:10px 0 6px;">Forgot Password</h1>
        <p style="font-size:13px; color:#888; margin-bottom:20px;">Enter your email and we'll send you a reset link.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
            <div style="width:100%; padding:10px 14px; border-radius:10px; font-size:13px; margin-bottom:12px; box-sizing:border-box;
                background:{% if category == 'success' %}#d1f5d3{% else %}#fde8e8{% endif %};
                color:{% if category == 'success' %}#1a6b2a{% else %}#b91c1c{% endif %};">
                {{ message }}
            </div>
            {% endfor %}
        {% endwith %}

        <form method="POST" action="/forgot-password" style="width:100%; display:flex; flex-direction:column; align-items:center; gap:12px;">
            <input type="email" name="email" placeholder="Enter your email address" required style="width:100%;">
            <button type="submit" style="width:100%; margin-top:4px;">Send Reset Link 📧</button>
        </form>

        <a href="/login" style="margin-top:16px; font-size:12px; color:#e91e8c; text-decoration:none; font-weight:500;"
            onmouseover="this.style.textDecoration='underline'"
            onmouseout="this.style.textDecoration='none'">← Back to Login</a>

    </div>
</div>
{% endblock %}
