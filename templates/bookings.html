{% extends 'base.html' %}

{% block content %}
<h2>All Bookings</h2>

{% if bookings %}
<table>
    <tr>
        <th>Name</th>
        <th>Service</th>
        <th>Stylist</th>
        <th>Date</th>
    </tr>
    {% for b in bookings %}
    <tr>
        <td>{{ b.name }}</td>
        <td>{{ b.service }}</td>
        <td>{{ b.stylist }}</td>
        <td>{{ b.date }}</td>
    </tr>
    {% endfor %}
</table>
{% else %}
<p>No bookings yet. <a href="/book">Book now!</a></p>
{% endif %}

{% endblock %}
