{% extends "base.html" %}
{% block content %}
<div class="form-page">
  <div class="form-box">
    <h2>Book Appointment</h2>
    <p>Service: <strong>{{ service }}</strong></p>
    <p>Stylist: <strong>{{ stylist }}</strong></p>
    <form method="POST">
      <div class="field">
        <label>Date</label>
        <input type="date" name="date" required>
      </div>
      <div class="field">
        <label>Time</label>
        <input type="time" name="time" required>
      </div>
      <div class="btn-wrap">
        <button type="submit" class="btn">Book Now</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
