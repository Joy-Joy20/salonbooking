{% extends "base.html" %}
{% block content %}
<div class="form-page">
  <img src="{{ url_for('static', filename='images/profile.png') }}" alt="profile" class="profile-img">
  <div class="form-box">
    <h2>Login</h2>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="POST">
      <div class="field">
        <label>Name</label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" name="email" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" name="password" required>
      </div>
      <div class="btn-wrap">
        <button type="submit" class="btn">Login</button>
      </div>
    </form>
    <p class="switch">Don't have an account? <a href="{{ url_for('signup') }}">Sign Up</a></p>
  </div>
</div>
{% endblock %}
